name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  release:
    types: ["published"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test

  ubs:
    name: UBS (critical-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install UBS (pinned)
        run: |
          UBS_COMMIT="af5a03b13c305ef2d9b484fa49421f2a18877355"
          UBS_RAW_BASE="https://raw.githubusercontent.com/Dicklesworthstone/ultimate_bug_scanner/$UBS_COMMIT"
          UBS_URL="$UBS_RAW_BASE/ubs"
          UBS_SHA256="3d0f2e8d59362a96253bee83d8e0bfc79ac8a71729442cfca0338bc53782810f"
          curl -fsSL "$UBS_URL" -o /tmp/ubs
          echo "$UBS_SHA256  /tmp/ubs" | sha256sum -c -
          python3 - <<'PY'
          from pathlib import Path

          path = Path("/tmp/ubs")
          text = path.read_text()
          text = text.replace(
              'REPO_RAW="https://raw.githubusercontent.com/Dicklesworthstone/ultimate_bug_scanner/master"',
              'REPO_RAW="https://raw.githubusercontent.com/Dicklesworthstone/ultimate_bug_scanner/af5a03b13c305ef2d9b484fa49421f2a18877355"',
              1,
          )
          path.write_text(text)
          PY
          install -m 0755 /tmp/ubs /usr/local/bin/ubs
          ubs --version
      - name: Run UBS critical-only gate (Rust scoped)
        run: ./scripts/ubs_gate.sh
      - name: Upload UBS summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ubs-gate-summary
          path: .ubs-gate-summary.json
          if-no-files-found: ignore
          retention-days: 14

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --workspace --release
      - name: Smoke test binary
        run: |
          if [ "$RUNNER_OS" != "Windows" ]; then
            ./target/release/verify --version
            ./target/release/verify --help || true
          else
            ./target/release/verify.exe --version
            ./target/release/verify.exe --help || true
          fi
        shell: bash

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, ubs, build]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" ]]; then
            echo "Format job failed"
            exit 1
          fi
          if [[ "${{ needs.clippy.result }}" != "success" ]]; then
            echo "Clippy job failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Test job failed"
            exit 1
          fi
          if [[ "${{ needs.ubs.result }}" != "success" ]]; then
            echo "UBS job failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" && "${{ needs.build.result }}" != "skipped" ]]; then
            echo "Build job failed"
            exit 1
          fi
          echo "All CI jobs passed successfully!"
